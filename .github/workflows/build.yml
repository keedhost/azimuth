# ─────────────────────────────────────────────────────────────────────────────
# GitHub Actions — Azimuth (Garmin Connect IQ)
# ─────────────────────────────────────────────────────────────────────────────
#
# Необхідні секрети (Settings → Secrets → Actions):
#   DEVELOPER_KEY_B64  — DER-ключ у base64:
#                        base64 -w0 developer_key.der   (Linux)
#                        base64 developer_key.der        (macOS)
#
# Необхідні змінні (Settings → Variables → Actions):
#   CIQ_SDK_URL        — повний URL Linux-SDK, напр.:
#     https://developer.garmin.com/downloads/connect-iq/sdks/connectiq-sdk-lin-7.4.3-2024-10-03-ab1234.zip
#
# GITHUB_TOKEN використовується автоматично (built-in) для публікації релізів.
# Жодних додаткових токенів не потрібно.
#
# Публікація артефактів:
#   PR / feature-гілки → GitHub Actions Artifact (14 днів)
#   push до main/master → GitHub Release "nightly" (pre-release, оновлюється)
#   тег v*.*.* → GitHub Release з changelog та SHA256SUMS
# ─────────────────────────────────────────────────────────────────────────────

name: Build & Publish

on:
  push:
    branches: [ main, master, develop ]
    tags:     [ 'v*.*.*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# Права на запис потрібні для створення/оновлення GitHub Releases
permissions:
  contents: write

env:
  TEST_DEVICE: fenix7

# ── Job: основна збірка та публікація ─────────────────────────────────────────
jobs:
  build:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # повна історія для generate-notes

      # ── 2. Перевірка обов'язкових налаштувань ─────────────────────────────
      - name: Validate required variables
        run: |
          ok=true
          if [ -z "${{ vars.CIQ_SDK_URL }}" ]; then
            echo "::error title=Missing variable::CIQ_SDK_URL is not set."
            echo "  Fix: Settings → Variables → Actions → New repository variable"
            echo "       Name : CIQ_SDK_URL"
            echo "       Value: full URL to the Garmin Connect IQ SDK for Linux (.zip)"
            echo "       Download: https://developer.garmin.com/connect-iq/sdk/"
            ok=false
          fi
          if [ -z "${{ secrets.DEVELOPER_KEY_B64 }}" ]; then
            echo "::error title=Missing secret::DEVELOPER_KEY_B64 is not set."
            echo "  Fix: Settings → Secrets → Actions → New repository secret"
            echo "       Name : DEVELOPER_KEY_B64"
            echo "       Value: base64 -w0 developer_key.der"
            ok=false
          fi
          $ok || exit 1

      # ── 3. Java ────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 4. Connect IQ SDK ──────────────────────────────────────────────────
      - name: Cache Connect IQ SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ~/ciq-sdk
          key: ciq-sdk-${{ hashFiles('**/monkey.jungle') }}-${{ vars.CIQ_SDK_URL }}

      - name: Download & install Connect IQ SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "${{ vars.CIQ_SDK_URL }}" -o /tmp/ciq-sdk.zip
          mkdir -p ~/ciq-sdk
          unzip -q /tmp/ciq-sdk.zip -d ~/ciq-sdk
          rm /tmp/ciq-sdk.zip

          # ── Стратегія 1: прямий SDK ──────────────────────────────────────
          if find ~/ciq-sdk -name monkeyc -type f -quit 2>/dev/null | grep -q .; then
            echo "Direct SDK detected."
            exit 0
          fi

          echo "SDK Manager detected. Trying automated installation..."
          sudo apt-get install -y xvfb xdotool 2>/dev/null

          # ── Стратегія 2: знайти пряме посилання у jar-файлах ────────────
          echo "Scanning SDK Manager jars for embedded SDK URL..."
          SDK_DL_URL=$(find ~/ciq-sdk -name "*.jar" 2>/dev/null \
            | xargs -I{} strings {} 2>/dev/null \
            | grep -Eo "https://[^[:space:]'\"]*connectiq[^[:space:]'\"]*\.zip" \
            | grep -i "lin" \
            | head -1 || true)

          if [ -n "$SDK_DL_URL" ]; then
            echo "Found SDK URL in jar: $SDK_DL_URL"
            curl -fsSL "$SDK_DL_URL" -o /tmp/ciq-actual.zip
            unzip -q /tmp/ciq-actual.zip -d ~/ciq-sdk
            rm /tmp/ciq-actual.zip
            if find ~/ciq-sdk -name monkeyc -type f -quit 2>/dev/null | grep -q .; then
              echo "SDK installed via URL from SDK Manager jar."
              exit 0
            fi
          fi

          # ── Стратегія 3: Xvfb + GUI automation ──────────────────────────
          echo "Starting SDK Manager with virtual display..."
          Xvfb :99 -screen 0 1280x1024x24 -ac &
          XVFB_PID=$!
          sleep 3
          export DISPLAY=:99

          ~/ciq-sdk/bin/sdkmanager &
          SDK_PID=$!

          echo "Waiting up to 4 min for SDK download..."
          for i in $(seq 1 120); do
            if find ~/.Garmin -name monkeyc -type f 2>/dev/null | grep -q .; then
              echo "SDK appeared after $((i*2))s"
              break
            fi
            # Кожні 20с: Enter+Space у активне вікно (прийняти dialog якщо є)
            if [ $((i % 10)) -eq 0 ]; then
              WIN=$(xdotool getactivewindow 2>/dev/null || true)
              [ -n "$WIN" ] && xdotool key --window "$WIN" Return space 2>/dev/null || true
            fi
            sleep 2
          done

          kill $SDK_PID 2>/dev/null || true
          kill $XVFB_PID 2>/dev/null || true

          MONKEYC=$(find ~/.Garmin -name monkeyc -type f 2>/dev/null | head -1)
          if [ -n "$MONKEYC" ]; then
            SDK_ROOT=$(dirname "$(dirname "$MONKEYC")")
            cp -r "${SDK_ROOT}/." ~/ciq-sdk/
            echo "SDK installed from: $SDK_ROOT"
            exit 0
          fi

          echo "::error::Усі стратегії не спрацювали."
          echo "SDK Manager потребує ручної взаємодії — не підтримує headless-режим."
          echo ""
          echo "Рішення: на macOS знайдіть вже встановлений SDK:"
          echo "  find ~/Library/Application\ Support/Garmin/ConnectIQ/Sdks -name monkeyc"
          echo "  Стисніть SDK-папку, завантажте в GitHub Releases і оновіть CIQ_SDK_URL."
          exit 1

      - name: Add SDK to PATH
        run: |
          MONKEYC=$(find ~/ciq-sdk -name monkeyc -type f 2>/dev/null | head -1)
          echo "monkeyc found at: ${MONKEYC}"
          echo "$(dirname "${MONKEYC}")" >> $GITHUB_PATH

      - name: Verify SDK
        run: monkeyc --version

      # ── 4. Developer key ───────────────────────────────────────────────────
      - name: Restore developer key
        run: |
          echo "${{ secrets.DEVELOPER_KEY_B64 }}" | base64 -d > developer_key.der
          chmod 600 developer_key.der

      # ── 5. Smoke build ─────────────────────────────────────────────────────
      - name: Build PRG (${{ env.TEST_DEVICE }})
        run: |
          monkeyc \
            -f monkey.jungle \
            -o "Azimuth-${{ env.TEST_DEVICE }}.prg" \
            -d "${{ env.TEST_DEVICE }}" \
            -y developer_key.der \
            -w

      # ── 6. Повна збірка IQ-пакету ──────────────────────────────────────────
      - name: Build IQ package (all devices)
        run: |
          monkeyc \
            -f monkey.jungle \
            -o Azimuth.iq \
            -e \
            -y developer_key.der \
            -w
          ls -lh Azimuth.iq

      # ── 7. Очищення ключа ──────────────────────────────────────────────────
      - name: Remove developer key
        if: always()
        run: rm -f developer_key.der

      # ── 8. Контрольна сума ─────────────────────────────────────────────────
      - name: Generate SHA256 checksum
        run: |
          sha256sum Azimuth.iq > SHA256SUMS.txt
          echo "=== SHA256SUMS.txt ==="
          cat SHA256SUMS.txt

      # ── 9a. PR / feature-гілки → Actions Artifact (тимчасово) ─────────────
      - name: Upload artifact (PR / feature branch)
        if: >
          github.event_name == 'pull_request' ||
          (github.ref != 'refs/heads/main' &&
           github.ref != 'refs/heads/master' &&
           !startsWith(github.ref, 'refs/tags/'))
        uses: actions/upload-artifact@v4
        with:
          name: Azimuth-${{ github.sha }}
          path: |
            Azimuth.iq
            SHA256SUMS.txt
          retention-days: 14

      # ── 9b. main/master → оновити Nightly Release ─────────────────────────
      - name: Publish nightly release
        if: >
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          # Видалити попередній nightly (тег + реліз), ігноруючи помилку якщо відсутній
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true

          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"

          cat > /tmp/nightly_notes.md << NOTES_EOF
          ## Nightly Build

          | | |
          |---|---|
          | **Гілка** | \`${{ github.ref_name }}\` |
          | **Commit** | [\`${SHORT_SHA}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |
          | **Дата** | ${BUILD_DATE} |

          ### Як встановити
          1. Завантажте \`Azimuth.iq\`
          2. Підключіть годинник до ПК
          3. Відкрийте Garmin Express → **Manage Apps** → **Install from File**
             або скопіюйте \`.iq\` до \`GARMIN/APPS/\`

          ### Перевірка цілісності
          \`\`\`
          sha256sum -c SHA256SUMS.txt
          \`\`\`

          > ⚠️ Нічна збірка може бути нестабільною.
          NOTES_EOF

          gh release create nightly \
            --title "Nightly Build — ${BUILD_DATE}" \
            --notes-file /tmp/nightly_notes.md \
            --prerelease \
            --target "${{ github.sha }}" \
            Azimuth.iq \
            SHA256SUMS.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 9c. Тег v*.*.* → Versioned Release ────────────────────────────────
      - name: Publish versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${{ github.ref_name }}"
          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')

          # Визначити попередній тег (може бути порожнім для першого релізу)
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p' || true)

          # Заголовок нотаток з інструкцією встановлення
          cat > /tmp/release_header.md << HEADER_EOF
          ### Як встановити
          1. Завантажте \`Azimuth.iq\`
          2. Підключіть годинник до ПК
          3. Відкрийте Garmin Express → **Manage Apps** → **Install from File**

          ### Підтримувані пристрої
          fenix 6/7, Forerunner 245/255/265/945, Epix 2, Instinct 2, Venu 2/3 та інші.
          Повний список — у \`manifest.xml\`.

          ### Перевірка цілісності
          \`\`\`
          sha256sum -c SHA256SUMS.txt
          \`\`\`

          **Зібрано:** ${BUILD_DATE}

          ---

          HEADER_EOF

          # Створити реліз (з auto-changelog якщо є попередній тег)
          if [ -n "${PREV_TAG}" ]; then
            gh release create "${VERSION}" \
              --title "Azimuth ${VERSION}" \
              --generate-notes \
              --notes-start-tag "${PREV_TAG}" \
              Azimuth.iq \
              SHA256SUMS.txt
          else
            gh release create "${VERSION}" \
              --title "Azimuth ${VERSION}" \
              --notes-file /tmp/release_header.md \
              Azimuth.iq \
              SHA256SUMS.txt
          fi

          # Якщо є auto-changelog — додати заголовок з інструкцією перед ним
          if [ -n "${PREV_TAG}" ]; then
            gh release view "${VERSION}" --json body -q .body >> /tmp/release_header.md
            gh release edit "${VERSION}" --notes-file /tmp/release_header.md
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job: матрична збірка (запускається після основної) ────────────────────
  build-matrix:
    name: Build (${{ matrix.device }})
    runs-on: ubuntu-latest
    needs: build
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' ||
       startsWith(github.ref, 'refs/tags/v'))

    strategy:
      fail-fast: false
      matrix:
        device:
          - fenix7
          - fenix7x
          - fenix7s
          - fr265
          - fr265s
          - epix2
          - instinct2
          - venu3

    steps:
      - uses: actions/checkout@v4

      - name: Validate CIQ_SDK_URL
        run: |
          if [ -z "${{ vars.CIQ_SDK_URL }}" ]; then
            echo "::error title=Missing variable::CIQ_SDK_URL is not set. See Settings → Variables → Actions."
            exit 1
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Connect IQ SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ~/ciq-sdk
          key: ciq-sdk-${{ hashFiles('**/monkey.jungle') }}-${{ vars.CIQ_SDK_URL }}

      - name: Download & install Connect IQ SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "${{ vars.CIQ_SDK_URL }}" -o /tmp/ciq-sdk.zip
          mkdir -p ~/ciq-sdk
          unzip -q /tmp/ciq-sdk.zip -d ~/ciq-sdk
          rm /tmp/ciq-sdk.zip

          # ── Стратегія 1: прямий SDK ──────────────────────────────────────
          if find ~/ciq-sdk -name monkeyc -type f -quit 2>/dev/null | grep -q .; then
            echo "Direct SDK detected."
            exit 0
          fi

          echo "SDK Manager detected. Trying automated installation..."
          sudo apt-get install -y xvfb xdotool 2>/dev/null

          # ── Стратегія 2: знайти пряме посилання у jar-файлах ────────────
          SDK_DL_URL=$(find ~/ciq-sdk -name "*.jar" 2>/dev/null \
            | xargs -I{} strings {} 2>/dev/null \
            | grep -Eo "https://[^[:space:]'\"]*connectiq[^[:space:]'\"]*\.zip" \
            | grep -i "lin" \
            | head -1 || true)

          if [ -n "$SDK_DL_URL" ]; then
            echo "Found SDK URL: $SDK_DL_URL"
            curl -fsSL "$SDK_DL_URL" -o /tmp/ciq-actual.zip
            unzip -q /tmp/ciq-actual.zip -d ~/ciq-sdk
            rm /tmp/ciq-actual.zip
            find ~/ciq-sdk -name monkeyc -type f -quit 2>/dev/null | grep -q . && exit 0
          fi

          # ── Стратегія 3: Xvfb + GUI automation ──────────────────────────
          Xvfb :99 -screen 0 1280x1024x24 -ac &
          XVFB_PID=$!
          sleep 3
          export DISPLAY=:99
          ~/ciq-sdk/bin/sdkmanager &
          SDK_PID=$!

          for i in $(seq 1 120); do
            find ~/.Garmin -name monkeyc -type f 2>/dev/null | grep -q . && break
            [ $((i % 10)) -eq 0 ] && {
              WIN=$(xdotool getactivewindow 2>/dev/null || true)
              [ -n "$WIN" ] && xdotool key --window "$WIN" Return space 2>/dev/null || true
            }
            sleep 2
          done

          kill $SDK_PID 2>/dev/null || true
          kill $XVFB_PID 2>/dev/null || true

          MONKEYC=$(find ~/.Garmin -name monkeyc -type f 2>/dev/null | head -1)
          if [ -n "$MONKEYC" ]; then
            cp -r "$(dirname "$(dirname "$MONKEYC")")/." ~/ciq-sdk/
            exit 0
          fi

          echo "::error::SDK installation failed. See 'Build & Publish' job for details."
          exit 1

      - name: Add SDK to PATH
        run: |
          MONKEYC=$(find ~/ciq-sdk -name monkeyc -type f 2>/dev/null | head -1)
          echo "monkeyc found at: ${MONKEYC}"
          echo "$(dirname "${MONKEYC}")" >> $GITHUB_PATH

      - name: Restore developer key
        run: echo "${{ secrets.DEVELOPER_KEY_B64 }}" | base64 -d > developer_key.der

      - name: Build PRG (${{ matrix.device }})
        run: |
          monkeyc \
            -f monkey.jungle \
            -o "Azimuth-${{ matrix.device }}.prg" \
            -d "${{ matrix.device }}" \
            -y developer_key.der \
            -w

      - name: Remove developer key
        if: always()
        run: rm -f developer_key.der

      # Завантажити PRG до вже існуючого релізу (nightly або тег)
      - name: Upload PRG to release
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            RELEASE_TAG="${{ github.ref_name }}"
          else
            RELEASE_TAG="nightly"
          fi
          gh release upload "${RELEASE_TAG}" \
            "Azimuth-${{ matrix.device }}.prg" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
